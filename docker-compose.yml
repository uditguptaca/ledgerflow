version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgerflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ledgerflow
      POSTGRES_PASSWORD: ledgerflow_dev_2024
      POSTGRES_DB: ledgerflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ledgerflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ledgerflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ledgerflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ledgerflow
      MINIO_ROOT_PASSWORD: ledgerflow_minio_2024
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ledgerflow-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledgerflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ledgerflow:ledgerflow_dev_2024@postgres:5432/ledgerflow?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ledgerflow-jwt-secret-dev-2024-change-in-production
      JWT_REFRESH_SECRET: ledgerflow-refresh-secret-dev-2024-change-in-production
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@ledgerflow.dev
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ledgerflow
      MINIO_SECRET_KEY: ledgerflow_minio_2024
      MINIO_BUCKET: ledgerflow-documents
      APP_URL: http://localhost:3000
      API_URL: http://localhost:3001
      PORT: 3001
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ledgerflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_NAME: LedgerFlow
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:
